<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-label="Robin Singh portfolio banner">
  <title>Robin Singh  Senior Full Stack Engineer</title>
  <rect width="1200" height="360" fill="#0a0a0a"/>
  <rect x="0" y="0" width="1200" height="360" fill="none" stroke="#222" stroke-width="1"/>

  <!-- grid -->
  <g stroke="#161616" stroke-width="1">
    <path d="M40 40 H1160 M40 80 H1160 M40 120 H1160 M40 160 H1160 M40 200 H1160 M40 240 H1160 M40 280 H1160 M40 320 H1160"/>
    <path d="M40 40 V320 M120 40 V320 M200 40 V320 M280 40 V320 M360 40 V320 M440 40 V320 M520 40 V320 M600 40 V320 M680 40 V320 M760 40 V320 M840 40 V320 M920 40 V320 M1000 40 V320 M1080 40 V320 M1160 40 V320"/>
  </g>

  <!-- terminal chrome -->
  <rect x="64" y="56" width="1072" height="248" rx="8" fill="#111" stroke="#2a2a2a"/>
  <circle cx="96" cy="84" r="6" fill="#333"/>
  <circle cx="118" cy="84" r="6" fill="#333"/>
  <circle cx="140" cy="84" r="6" fill="#333"/>
  <text x="180" y="89" fill="#666" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">robin@portfolio  runtime</text>

  <text x="96" y="140" fill="#888" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">$</text>

  <text fill="#f5f5f5" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" x="120" y="140">
    <tspan>whoami</tspan>
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.08;0.12;1" dur="8s" repeatCount="indefinite"/>
  </text>

  <text fill="#a3a3a3" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" x="96" y="176">
    <tspan>Robin Singh ť Senior Full Stack Engineer</tspan>
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.18;0.24;1" dur="8s" repeatCount="indefinite"/>
  </text>

  <text fill="#888" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" x="96" y="220">
    <tspan>$ </tspan>
    <tspan fill="#f5f5f5">cat mission.txt</tspan>
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.38;0.44;1" dur="8s" repeatCount="indefinite"/>
  </text>

  <text fill="#d4d4d4" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" x="96" y="256">
    <tspan>Building scalable systems that solve real problems.</tspan>
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.5;0.56;1" dur="8s" repeatCount="indefinite"/>
  </text>

  <!-- caret -->
  <rect x="96" y="278" width="10" height="18" fill="#f5f5f5">
    <animate attributeName="opacity" values="0;0;1;0;1;0;1" keyTimes="0;0.62;0.68;0.75;0.82;0.9;1" dur="8s" repeatCount="indefinite"/>
  </rect>

  <text x="980" y="300" fill="#444" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">robinsingh.dev</text>
</svg>
